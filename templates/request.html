{% extends 'base.html' %}

{% block content %}

<h2 class="text-center">Request Blood</h2>

<form method="post" class="card p-4 shadow">
    {% csrf_token %}

    <input type="text" name="patient_name" class="form-control mb-3" placeholder="Patient Name" required>

    <input type="text" name="blood_group" class="form-control mb-3" placeholder="Blood Group" required>

    <input type="text" name="location" class="form-control mb-3" placeholder="Location" required>

    <button class="btn btn-danger w-100">Submit Request</button>
</form>

{% endblock %}
